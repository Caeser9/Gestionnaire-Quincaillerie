appId: com.quincaillerie.gestionnaire
productName: Gestionnaire Quincaillerie
directories:
  output: release
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/mongodb
    to: mongodb
    filter:
      - "**/*"
  - from: resources/demo/demo-data.json
    to: demo-data.json
    filter:
      - "**/*"
win:
  target:
    - nsis
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - fr
  language: '1036'
  include: resources/installer.nsh
